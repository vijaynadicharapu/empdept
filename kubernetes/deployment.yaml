apiVersion: apps/v1
kind: Deployment

metadata:
  name: employee-app
  namespace: employee-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: employee-app

  template:

    metadata:
      labels:
        app: employee-app

    spec:

      serviceAccountName: employee-app-sa

      containers:

      - name: employee-app

        image: 383189130218.dkr.ecr.us-east-1.amazonaws.com/employee-app:8e349f928d728f15cd0eac80200e28db2d33a844

        ports:
        - containerPort: 5000

        env:
        - name: SECRET_NAME
          value: rdsaccesss
        - name: REGION
          value: us-east-1
        - name: RDS_HOST
          value: empdatabase-11.c8nkiuao88ny.us-east-1.rds.amazonaws.com
        - name: RDS_PORT
          value: "5432"

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
